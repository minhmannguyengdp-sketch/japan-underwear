name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply_ui_regression_fix:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.ref == 'ui/mobile-app-shell-pensee' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UI branch
        uses: actions/checkout@v4
        with:
          ref: ui/mobile-app-shell-pensee
          fetch-depth: 0

      - name: Apply exact reviewed changes
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/ui-regression-fix.trigger
          test -f .github/workflows/apply-ui-regression-fix.yml
          awk '
            /^          python - <<.PY./ { capture=1; next }
            /^          PY$/ { capture=0 }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/apply-ui-regression-fix.yml > /tmp/apply-ui-regression-fix.py
          test -s /tmp/apply-ui-regression-fix.py
          python /tmp/apply-ui-regression-fix.py

      - name: Commit UI fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/chao-mung/page.tsx app/storefront-polish.css components/app-shell/app-shell-boundary.tsx components/catalog-ordering-v2.tsx public/sw.js
          git diff --cached --check
          git commit -m "fix(ui): restore welcome branding and gallery thumbnails"
          git push origin HEAD:ui/mobile-app-shell-pensee

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify toolchain
        shell: bash
        run: |
          test "$(node --version)" = "v22.23.1"
          test "$(npm --version)" = "10.9.8"

      - name: Verify lockfile portability
        shell: bash
        run: |
          node <<'NODE'
          const lock = require('./package-lock.json');
          const required = [
            'node_modules/@next/swc-linux-x64-gnu',
            'node_modules/@next/swc-win32-x64-msvc',
            'node_modules/@tailwindcss/oxide-linux-x64-gnu',
            'node_modules/@tailwindcss/oxide-win32-x64-msvc',
            'node_modules/@img/sharp-linux-x64',
            'node_modules/@img/sharp-win32-x64',
            'node_modules/lightningcss-linux-x64-gnu',
            'node_modules/lightningcss-win32-x64-msvc',
          ];

          for (const key of required) {
            if (!lock.packages?.[key]) {
              throw new Error(`Missing portable optional dependency: ${key}`);
            }
          }
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Verify live-image color review workflow
        run: npm run catalog:web:color:image-review:verify

      - name: Verify supplier product data workflow
        run: npm run catalog:supplier:verify

      - name: Verify supplier color reconciliation workflow
        run: npm run catalog:supplier:reconcile:verify

      - name: Verify owner color supplement workflow
        run: npm run catalog:owner-color:verify

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint-report.txt

      - name: Upload lint report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-report.txt
          if-no-files-found: error

      - name: Build
        run: npm run build
