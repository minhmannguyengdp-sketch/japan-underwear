name: Package Vercel Production Source

on:
  push:
    branches:
      - ui/mobile-app-shell-pensee
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package exact approved commit
        shell: bash
        run: |
          set -euo pipefail
          APPROVED_SHA="7a934a41fb052736072ccdaecff471d002c75ca6"
          git cat-file -e "${APPROVED_SHA}^{commit}"
          git archive --format=zip --output=vercel-source.zip "${APPROVED_SHA}"
          sha256sum vercel-source.zip > vercel-source.sha256

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-production-source-7a934a4
          path: |
            vercel-source.zip
            vercel-source.sha256
          if-no-files-found: error
          retention-days: 1
