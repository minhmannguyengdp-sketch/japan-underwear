name: Refactor customer order transaction

on:
  pull_request:

permissions:
  contents: write

jobs:
  refactor:
    if: github.head_ref == 'feat/customer-order-history'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move ownership into checkout transaction
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          function replaceExact(path, before, after) {
            const current = fs.readFileSync(path, 'utf8');
            if (!current.includes(before)) {
              throw new Error(`Expected block not found in ${path}: ${before.slice(0, 120)}`);
            }
            fs.writeFileSync(path, current.replace(before, after));
          }

          replaceExact(
            'lib/server-ordering.ts',
            `export async function createServerOrder(
              requestedToken: string | null,
              input: CheckoutInput,
            ): Promise<CreatedOrder> {
              const location = normalizeCheckoutLocation(input.location);`,
            `export async function createServerOrder(
              requestedToken: string | null,
              customerUserId: string,
              input: CheckoutInput,
            ): Promise<CreatedOrder> {
              const normalizedCustomerUserId = customerUserId.trim().toLowerCase();
              if (!UUID_PATTERN.test(normalizedCustomerUserId)) {
                throw new OrderingError(
                  "Danh tính người dùng không hợp lệ.",
                  400,
                  "invalid_customer_user_id",
                );
              }
              const location = normalizeCheckoutLocation(input.location);`,
          );

          replaceExact(
            'lib/server-ordering.ts',
            `          subtotal,
                      currency
                    )
                    VALUES (
                      $1, $2::uuid, 'submitted', $3, $4, $5, $6,
                      $7, $8, $9, $10::timestamptz, $11, $12, $13
                    )`,
            `          subtotal,
                      currency,
                      customer_user_id
                    )
                    VALUES (
                      $1, $2::uuid, 'submitted', $3, $4, $5, $6,
                      $7, $8, $9, $10::timestamptz, $11, $12, $13, $14::uuid
                    )`,
          );

          replaceExact(
            'lib/server-ordering.ts',
            `          subtotal,
                      currency,
                    ],`,
            `          subtotal,
                      currency,
                      normalizedCustomerUserId,
                    ],`,
          );

          replaceExact(
            'app/api/orders/route.ts',
            `import { bindCustomerCartOwner } from "@/lib/customer-cart-ownership";
`,
            '',
          );
          replaceExact(
            'app/api/orders/route.ts',
            `    await bindCustomerCartOwner(cartToken, context.userId);
                const order = await createServerOrder(cartToken, parsed.data);`,
            `    const order = await createServerOrder(cartToken, context.userId, parsed.data);`,
          );

          replaceExact(
            'lib/customer-order-http.ts',
            `import { CustomerCartOwnershipError } from "@/lib/customer-cart-ownership";
`,
            '',
          );
          replaceExact(
            'lib/customer-order-http.ts',
            `  if (
                error instanceof CustomerCartOwnershipError ||
                error instanceof CustomerOrderError ||
                error instanceof OrderingError
              ) {`,
            `  if (error instanceof CustomerOrderError || error instanceof OrderingError) {`,
          );

          replaceExact(
            'app/don-hang/[orderCode]/page.tsx',
            `    if (error instanceof CustomerOrderError && error.status === 404) {
                  notFound();
                }`,
            `    if (error instanceof CustomerOrderError) {
                  notFound();
                }`,
          );

          fs.writeFileSync(
            'drizzle/0008_customer_order_ownership.sql',
            `ALTER TABLE "japan_underwear"."orders"
              ADD COLUMN IF NOT EXISTS "customer_user_id" uuid;
            --> statement-breakpoint
            DO $$
            BEGIN
              IF NOT EXISTS (
                SELECT 1
                FROM pg_constraint
                WHERE conrelid = 'japan_underwear.orders'::regclass
                  AND conname = 'orders_customer_user_id_users_id_fk'
              ) THEN
                ALTER TABLE "japan_underwear"."orders"
                  ADD CONSTRAINT "orders_customer_user_id_users_id_fk"
                  FOREIGN KEY ("customer_user_id")
                  REFERENCES "japan_underwear"."users"("id")
                  ON DELETE RESTRICT ON UPDATE NO ACTION;
              END IF;
            END
            $$;
            --> statement-breakpoint
            CREATE INDEX IF NOT EXISTS "orders_customer_user_created_idx"
              ON "japan_underwear"."orders" USING btree ("customer_user_id", "created_at" DESC, "id" DESC)
              WHERE "customer_user_id" IS NOT NULL;
            --> statement-breakpoint
            CREATE OR REPLACE FUNCTION "japan_underwear"."protect_order_customer_owner"()
            RETURNS trigger
            LANGUAGE plpgsql
            AS $$
            BEGIN
              IF OLD.customer_user_id IS NOT NULL
                 AND NEW.customer_user_id IS DISTINCT FROM OLD.customer_user_id THEN
                RAISE EXCEPTION 'Order customer owner cannot be changed once assigned.'
                  USING ERRCODE = '23514';
              END IF;
              RETURN NEW;
            END;
            $$;
            --> statement-breakpoint
            DROP TRIGGER IF EXISTS "orders_customer_owner_guard_trg"
              ON "japan_underwear"."orders";
            --> statement-breakpoint
            CREATE TRIGGER "orders_customer_owner_guard_trg"
            BEFORE UPDATE OF "customer_user_id"
            ON "japan_underwear"."orders"
            FOR EACH ROW EXECUTE FUNCTION "japan_underwear"."protect_order_customer_owner"();
            `.replace(/^            /gm, ''),
          );

          replaceExact(
            'scripts/db/apply-customer-order-ownership.mjs',
            `      to_regclass('japan_underwear.carts') AS carts,
`,
            '',
          );
          replaceExact(
            'scripts/db/apply-customer-order-ownership.mjs',
            `    WHERE table_schema = 'japan_underwear'
                  AND table_name = ANY(ARRAY['carts', 'orders']::text[])
                  AND column_name = 'customer_user_id'
                ORDER BY table_name
              `,
            `    WHERE table_schema = 'japan_underwear'
                  AND table_name = 'orders'
                  AND column_name = 'customer_user_id'
              `,
          );
          replaceExact(
            'scripts/db/apply-customer-order-ownership.mjs',
            `  if (columnResult.rowCount !== 2) {
                throw new Error("Hậu kiểm 0008 thiếu customer_user_id trên carts hoặc orders.");
              }`,
            `  if (columnResult.rowCount !== 1) {
                throw new Error("Hậu kiểm 0008 thiếu orders.customer_user_id.");
              }`,
          );
          replaceExact(
            'scripts/db/apply-customer-order-ownership.mjs',
            `    WHERE conname = ANY(ARRAY[
                  'carts_customer_user_id_users_id_fk',
                  'orders_customer_user_id_users_id_fk'
                ]::text[])
                  AND contype = 'f'
              `,
            `    WHERE conname = 'orders_customer_user_id_users_id_fk'
                  AND contype = 'f'
              `,
          );
          replaceExact(
            'scripts/db/apply-customer-order-ownership.mjs',
            `  for (const name of [
                "carts_customer_user_id_users_id_fk",
                "orders_customer_user_id_users_id_fk",
              ]) {`,
            `  for (const name of ["orders_customer_user_id_users_id_fk"]) {`,
          );
          replaceExact(
            'scripts/db/apply-customer-order-ownership.mjs',
            `    WHERE schemaname = 'japan_underwear'
                  AND indexname = ANY(ARRAY[
                    'carts_customer_user_status_idx',
                    'orders_customer_user_created_idx'
                  ]::text[])
              `,
            `    WHERE schemaname = 'japan_underwear'
                  AND indexname = 'orders_customer_user_created_idx'
              `,
          );
          replaceExact(
            'scripts/db/apply-customer-order-ownership.mjs',
            `  for (const name of ["carts_customer_user_status_idx", "orders_customer_user_created_idx"]) {`,
            `  for (const name of ["orders_customer_user_created_idx"]) {`,
          );
          replaceExact(
            'scripts/db/apply-customer-order-ownership.mjs',
            `    WHERE trigger_schema = 'japan_underwear'
                  AND trigger_name = ANY(ARRAY[
                    'carts_customer_owner_guard_trg',
                    'orders_customer_owner_guard_trg'
                  ]::text[])
              `,
            `    WHERE trigger_schema = 'japan_underwear'
                  AND trigger_name = 'orders_customer_owner_guard_trg'
              `,
          );
          replaceExact(
            'scripts/db/apply-customer-order-ownership.mjs',
            `  for (const name of ["carts_customer_owner_guard_trg", "orders_customer_owner_guard_trg"]) {`,
            `  for (const name of ["orders_customer_owner_guard_trg"]) {`,
          );
          replaceExact(
            'scripts/db/apply-customer-order-ownership.mjs',
            `    console.log("Authenticated checkout binds cart owner and order inherits the same internal UUID.");
                console.log("Legacy/staff orders may remain unowned; assigned cart/order owners are immutable.");`,
            `    console.log("Authenticated checkout writes the internal user UUID in the order transaction.");
                console.log("Legacy/staff orders may remain unowned; assigned order owners are immutable.");`,
          );

          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `    const cartResult = await client.query(
                  \`
                    INSERT INTO japan_underwear.carts (token, status, customer_user_id)
                    VALUES
                      (gen_random_uuid(), 'converted', $1::uuid),
                      (gen_random_uuid(), 'converted', $2::uuid),
                      (gen_random_uuid(), 'converted', NULL)
                    RETURNING id
                  \`,
                  [userA.id, userB.id],
                );`,
            `    const cartResult = await client.query(\`
                  INSERT INTO japan_underwear.carts (token, status)
                  VALUES
                    (gen_random_uuid(), 'converted'),
                    (gen_random_uuid(), 'converted'),
                    (gen_random_uuid(), 'converted')
                  RETURNING id
                \`);`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `
                await expectConstraintFailure("cart owner reassignment", () =>
                  client.query(
                    "UPDATE japan_underwear.carts SET customer_user_id = $2::uuid WHERE id = $1::uuid",
                    [cartA.id, userB.id],
                  ),
                );
`,
            '\n',
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `        INSERT INTO japan_underwear.orders (
                      order_code, source_cart_id, status,
                      customer_name, customer_phone, subtotal, currency
                    ) VALUES
                      ($1, $2::uuid, 'submitted', 'Customer A', '0900000001', 1000, 'VND'),
                      ($3, $4::uuid, 'submitted', 'Customer B', '0900000002', 2000, 'VND'),
                      ($5, $6::uuid, 'submitted', 'Legacy Customer', '0900000003', 3000, 'VND')
                  \`,
                  [codeA, cartA.id, codeB, cartB.id, codeLegacy, cartLegacy.id],`,
            `        INSERT INTO japan_underwear.orders (
                      order_code, source_cart_id, status, customer_user_id,
                      customer_name, customer_phone, subtotal, currency
                    ) VALUES
                      ($1, $2::uuid, 'submitted', $3::uuid, 'Customer A', '0900000001', 1000, 'VND'),
                      ($4, $5::uuid, 'submitted', $6::uuid, 'Customer B', '0900000002', 2000, 'VND'),
                      ($7, $8::uuid, 'submitted', NULL, 'Legacy Customer', '0900000003', 3000, 'VND')
                  \`,
                  [codeA, cartA.id, userA.id, codeB, cartB.id, userB.id, codeLegacy, cartLegacy.id],`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `      throw new Error("Order A did not inherit customer owner from its source cart.");`,
            `      throw new Error("Order A did not store the checkout customer owner.");`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `      throw new Error("Order B did not inherit customer owner from its source cart.");`,
            `      throw new Error("Order B did not store the checkout customer owner.");`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `      throw new Error("Legacy/staff cart without owner unexpectedly assigned an order owner.");`,
            `      throw new Error("Legacy/staff order unexpectedly received a customer owner.");`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `        (SELECT count(*)::integer
                     FROM information_schema.columns
                     WHERE table_schema = 'japan_underwear'
                       AND table_name = ANY(ARRAY['carts', 'orders']::text[])
                       AND column_name = 'customer_user_id'
                       AND data_type = 'uuid') AS owner_columns,
                    (SELECT count(*)::integer
                     FROM pg_indexes
                     WHERE schemaname = 'japan_underwear'
                       AND indexname = ANY(ARRAY[
                         'carts_customer_user_status_idx',
                         'orders_customer_user_created_idx'
                       ]::text[])) AS owner_indexes,
                    (SELECT count(DISTINCT trigger_name)::integer
                     FROM information_schema.triggers
                     WHERE trigger_schema = 'japan_underwear'
                       AND trigger_name = ANY(ARRAY[
                         'carts_customer_owner_guard_trg',
                         'orders_customer_owner_guard_trg'
                       ]::text[])) AS owner_guards`,
            `        (SELECT count(*)::integer
                     FROM information_schema.columns
                     WHERE table_schema = 'japan_underwear'
                       AND table_name = 'orders'
                       AND column_name = 'customer_user_id'
                       AND data_type = 'uuid') AS owner_columns,
                    (SELECT count(*)::integer
                     FROM pg_indexes
                     WHERE schemaname = 'japan_underwear'
                       AND indexname = 'orders_customer_user_created_idx') AS owner_indexes,
                    (SELECT count(DISTINCT trigger_name)::integer
                     FROM information_schema.triggers
                     WHERE trigger_schema = 'japan_underwear'
                       AND trigger_name = 'orders_customer_owner_guard_trg') AS owner_guards`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `      Number(state.owner_columns) !== 2 ||
                  Number(state.owner_indexes) !== 2 ||
                  Number(state.owner_guards) !== 2`,
            `      Number(state.owner_columns) !== 1 ||
                  Number(state.owner_indexes) !== 1 ||
                  Number(state.owner_guards) !== 1`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `      throw new Error("Customer cart/order ownership schema is incomplete.");`,
            `      throw new Error("Customer order ownership schema is incomplete.");`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `      SELECT
                    (SELECT count(*)::integer
                     FROM japan_underwear.carts AS cart
                     LEFT JOIN japan_underwear.users AS auth_user ON auth_user.id = cart.customer_user_id
                     WHERE cart.customer_user_id IS NOT NULL AND auth_user.id IS NULL) AS orphan_carts,
                    (SELECT count(*)::integer
                     FROM japan_underwear.orders AS orders
                     LEFT JOIN japan_underwear.users AS auth_user ON auth_user.id = orders.customer_user_id
                     WHERE orders.customer_user_id IS NOT NULL AND auth_user.id IS NULL) AS orphan_orders`,
            `      SELECT
                    (SELECT count(*)::integer
                     FROM japan_underwear.orders AS orders
                     LEFT JOIN japan_underwear.users AS auth_user ON auth_user.id = orders.customer_user_id
                     WHERE orders.customer_user_id IS NOT NULL AND auth_user.id IS NULL) AS orphan_orders`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `      Number(orphanResult.rows[0]?.orphan_carts ?? 0) !== 0 ||
                  Number(orphanResult.rows[0]?.orphan_orders ?? 0) !== 0`,
            `      Number(orphanResult.rows[0]?.orphan_orders ?? 0) !== 0`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `      throw new Error("Carts or orders contain orphan customer owners.");`,
            `      throw new Error("Orders contain orphan customer owners.");`,
          );
          replaceExact(
            'scripts/db/verify-customer-order-ownership.mjs',
            `    console.log("Cart binding: immutable internal user UUID.");
                console.log("Order owner: inherited from source cart in the order insert transaction.");`,
            `    console.log("Order owner: written with the internal user UUID in checkout transaction.");`,
          );

          fs.rmSync('lib/customer-cart-ownership.ts');
          fs.rmSync('.github/workflows/refactor-customer-order-transaction.yml');
          NODE

      - name: Commit refactor
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: write order owner inside checkout transaction"
          git push origin HEAD:${{ github.head_ref }}
